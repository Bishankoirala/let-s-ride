<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>VehicleRent Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f5f7fb;
            min-height: 100vh;
        }

        .auth-wrapper {
            min-height: 100vh;
        }

        .left-image {
            height: 100%;
            min-height: 750px;
            object-fit: cover;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
        }

        @media(max-width:991px) {
            .left-image {
                min-height: 250px;
            }
        }
    </style>

</head>

<body>

    <div class="container-fluid auth-wrapper d-flex align-items-center py-4">

        <div class="container">

            <div class="card shadow-lg overflow-hidden border-0">

                <div class="row g-0">

                    <!-- Image -->

                    <div class="col-lg-5">

                        <img src="https://images.unsplash.com/photo-1553440569-bcc63803a83d?w=1200"
                            class="img-fluid w-100 left-image" alt="vehicle">

                    </div>

                    <!-- Form -->

                    <div class="col-lg-7 bg-white">

                        <div class="p-4 p-lg-5">

                            <div class="text-center mb-4">

                                <h2 class="logo">

                                    <i class="bi bi-car-front-fill text-primary"></i>

                                    Vehicle<span class="text-primary">Rent</span>

                                </h2>

                                <h3 class="fw-bold mt-4">

                                    Create Account

                                </h3>

                                <p class="text-muted">

                                    Join VehicleRent today

                                </p>

                            </div>

                            <form>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Full Name
                                    </label>

                                    <input type="text" class="form-control" placeholder="Enter your full name">

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Email
                                    </label>

                                    <input type="email" class="form-control" placeholder="Enter your email">

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Phone Number
                                    </label>

                                    <input type="tel" class="form-control" placeholder="Enter your phone number">

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Password
                                    </label>

                                    <div class="input-group">

                                        <input type="password" class="form-control" placeholder="Create password">

                                        <button type="button" class="btn btn-outline-secondary">

                                            <i class="bi bi-eye"></i>

                                        </button>

                                    </div>

                                </div>

                                <div class="mb-4">

                                    <label class="form-label d-block">

                                        I am a

                                    </label>

                                    <div class="form-check form-check-inline">

                                        <input class="form-check-input" type="radio" name="role" checked>

                                        <label class="form-check-label">

                                            Customer

                                        </label>

                                    </div>

                                    <div class="form-check form-check-inline">

                                        <input class="form-check-input" type="radio" name="role">

                                        <label class="form-check-label">

                                            Vehicle Owner

                                        </label>

                                    </div>

                                </div>

                                <button class="btn btn-primary w-100 py-2">

                                    Register

                                </button>

                                <div class="text-center mt-4">

                                    Already have an account?

                                    <a href="login.html" class="text-decoration-none fw-bold">

                                        Login here

                                    </a>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
