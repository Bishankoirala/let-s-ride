<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>VehicleRent Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f5f7fb;
            min-height: 100vh;
        }

        .auth-wrapper {
            min-height: 100vh;
        }

        .left-image {
            height: 100%;
            min-height: 650px;
            object-fit: cover;
        }

        .login-card {
            border: none;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
        }

        @media(max-width:991px) {
            .left-image {
                min-height: 250px;
            }
        }
    </style>

</head>

<body>

    <div class="container-fluid auth-wrapper d-flex align-items-center py-4">

        <div class="container">

            <div class="card shadow-lg login-card overflow-hidden">

                <div class="row g-0">

                    <!-- Image Section -->
                    <div class="col-lg-5">

                        <img src="https://images.unsplash.com/photo-1553440569-bcc63803a83d?w=1200"
                            class="img-fluid w-100 left-image" alt="vehicle">

                    </div>

                    <!-- Form Section -->
                    <div class="col-lg-7 bg-white">

                        <div class="p-4 p-lg-5">

                            <div class="text-center mb-5">

                                <h2 class="logo">
                                    <i class="bi bi-car-front-fill text-primary"></i>
                                    Vehicle<span class="text-primary">Rent</span>
                                </h2>

                                <h3 class="fw-bold mt-4">
                                    Welcome Back!
                                </h3>

                                <p class="text-muted">
                                    Login to continue
                                </p>

                            </div>

                            <form>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Email
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-envelope"></i>
                                        </span>

                                        <input type="email" class="form-control" placeholder="Enter your email">

                                    </div>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Password
                                    </label>

                                    <div class="input-group">

                                        <span class="input-group-text">
                                            <i class="bi bi-lock"></i>
                                        </span>

                                        <input type="password" class="form-control" placeholder="Enter your password">

                                        <button type="button" class="btn btn-outline-secondary">
                                            <i class="bi bi-eye"></i>
                                        </button>

                                    </div>

                                </div>

                                <div class="text-end mb-4">

                                    <a href="#" class="text-decoration-none">
                                        Forgot Password?
                                    </a>

                                </div>

                                <button class="btn btn-primary w-100 py-2">

                                    Login

                                </button>

                                <div class="text-center mt-4">

                                    Don't have an account?

                                    <a href="register.html" class="text-decoration-none fw-bold">

                                        Register here

                                    </a>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
